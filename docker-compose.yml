services:
  postgres:
    image: postgres:14-alpine
    container_name: convoy_postgres
    environment:
      POSTGRES_USER: convoy
      POSTGRES_PASSWORD: stuffnthings
      POSTGRES_DB: convoy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convoy -d convoy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: convoy_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    container_name: convoy_web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
